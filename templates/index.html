<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noon Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f5;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header .logo span { color: #ff6a00; }

    .main { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }

    .search-box {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

    input[type=text] {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      min-width: 260px;
      background: #fafafa;
      transition: border-color 0.15s;
    }
    input[type=text]:focus { border-color: #aaa; background: #fff; }

    select {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background: #fafafa;
      outline: none;
      cursor: pointer;
    }

    /* Container for action buttons */
    .actions {
      display: flex;
      gap: 8px;
    }

    button#scrape, .btn-secondary {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    button#scrape { background: #111; color: #fff; }
    button#scrape:hover { background: #333; }
    button#scrape:active { transform: scale(0.98); }
    button#scrape:disabled { background: #ccc; cursor: not-allowed; }

    .btn-secondary { background: #444; color: #fff; }
    .btn-secondary:hover { background: #666; }
    .btn-secondary:active { transform: scale(0.98); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .stat {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
    }

    .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-val { font-size: 1.35rem; font-weight: 600; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    input#filter {
      flex: 1;
      min-width: 180px;
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }

    select#sortBy {
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }

    .results-wrap {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 10px 14px;
      background: #fafafa;
      color: #888;
      font-weight: 500;
      border-bottom: 1px solid #e5e5e5;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: #111; }

    td { padding: 10px 14px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .product-cell { display: flex; align-items: center; gap: 10px; }
    .product-img-wrapper {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
      background: #fafafa;
      cursor: zoom-in;
      display: block;
    }
    .product-img-popup {
      display: none;
      position: absolute;
      top: -10px;
      left: 72px;
      width: min(420px, 45vw);
      max-height: 65vh;
      padding: 10px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.16);
      z-index: 200;
    }
    .product-img-popup img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      border-radius: 10px;
    }
    .product-img-wrapper:hover .product-img-popup {
      display: block;
    }

    .product-name {
      color: #111;
      text-decoration: none;
      line-height: 1.35;
      font-size: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-name:hover { color: #ff6a00; }

    .price { font-weight: 600; white-space: nowrap; }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 500;
      white-space: nowrap;
    }
    .budget   { background: #e8f5e9; color: #2e7d32; }
    .mid      { background: #fff8e1; color: #e65100; }
    .highend  { background: #fce4ec; color: #b71c1c; }

    .dim { color: #ccc; font-size: 12px; }

    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 14px;
    }

    .status .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #ddd;
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status .msg { color: #888; font-size: 13px; margin-top: 6px; }

    #results-section { display: none; }

    .error-msg {
      background: #fce4ec;
      color: #b71c1c;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">noon <span>scraper</span></div>
</header>

<div class="main">

<div class="search-box">
    <div class="field">
      <label>Country</label>
      <select id="country">
        <option value="saudi">Saudi Arabia</option>
        <option value="uae">UAE</option>
        <option value="egypt">Egypt</option>
      </select>
    </div>
    <div class="field">
      <label>Search query</label>
      <input type="text" id="query" placeholder="e.g. rtx 5070, iphone 16" value="rtx 5070">
    </div>
    <div class="field">
      <label>Pages</label>
      <select id="pages">
        <option value="1">1 page (~50)</option>
        <option value="2" selected>2 pages (~100)</option>
        <option value="4">4 pages (~200)</option>
      </select>
    </div>
    <!-- Cleaned up actions area -->
    <div class="actions">
      <button id="scrape" onclick="startScrape()">Scrape</button>
      <button id="download" class="btn-secondary" onclick="downloadCSV()" style="display: none;">Download CSV</button>
    </div>
  </div>

  <div class="error-msg" id="error"></div>

  <div id="loading" style="display:none;">
    <div class="status">
      <div><div class="spinner"></div></div>
      <div>Scraping Noon...</div>
      <div class="msg" id="loading-msg">This takes 10–30 seconds depending on pages</div>
    </div>
  </div>

  <div id="results-section">
    <div class="stats" id="stats"></div>

    <div class="controls">
      <input type="text" id="filter" placeholder="Filter products..." oninput="renderTable()">
      <select id="sortBy" onchange="renderTable()">
        <option value="price-asc">Price: low to high</option>
        <option value="price-desc">Price: high to low</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>

<div class="results-wrap">
  <table>
    <thead>
      <tr>
        <th class="dim">#</th>
        <th>Product</th>
        <th id="price-header" onclick="togglePriceSort()">Price (SAR)</th>
        <th>Tier</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div>

<script>
let allProducts = [];
let priceSortDir = 1;
let currentCurrency = 'SAR';

const currencies = {
  'saudi': 'SAR',
  'uae': 'AED',
  'egypt': 'EGP'
};

function tier(p) {
  if (p < 2000) return ['Budget', 'budget'];
  if (p < 5000) return ['Mid-range', 'mid'];
  return ['High-end', 'highend'];
}

function togglePriceSort() {
  priceSortDir *= -1;
  document.getElementById('sortBy').value = priceSortDir === 1 ? 'price-asc' : 'price-desc';
  renderTable();
}

async function startScrape() {
  const query = document.getElementById('query').value.trim();
  const pages = document.getElementById('pages').value;
  const country = document.getElementById('country').value;

  if (!query) return;

  currentCurrency = currencies[country];

  document.getElementById('error').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('scrape').disabled = true;
  document.getElementById('scrape').textContent = 'Scraping...';

  const msgs = ['Fetching page 1...', 'Fetching page 2...', 'Almost done...', 'Parsing results...'];
  let msgIdx = 0;
  const msgEl = document.getElementById('loading-msg');
  const msgInterval = setInterval(() => {
    msgEl.textContent = msgs[Math.min(msgIdx++, msgs.length - 1)];
  }, 5000);

  try {
    const res = await fetch(`/search?q=${encodeURIComponent(query)}&pages=${pages}&country=${country}`);
    const data = await res.json();

    clearInterval(msgInterval);
    document.getElementById('loading').style.display = 'none';

    if (data.error) throw new Error(data.error);

    allProducts = data.products;
    document.getElementById('results-section').style.display = 'block';
    
    // Show download button
    const dlBtn = document.getElementById('download');
    if(dlBtn) dlBtn.style.display = 'inline-block';
    
    document.getElementById('price-header').innerHTML = `Price (${currentCurrency})`;
    renderTable();

  } catch (err) {
    clearInterval(msgInterval);
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.textContent = 'Error: ' + err.message;
    errEl.style.display = 'block';
  } finally {
    document.getElementById('scrape').disabled = false;
    document.getElementById('scrape').textContent = 'Scrape';
  }
}

function renderTable() {
  const q = document.getElementById('filter').value.toLowerCase();
  const sort = document.getElementById('sortBy').value;

  let data = allProducts.filter(r => r.name.toLowerCase().includes(q));

  if (sort === 'price-asc') data.sort((a, b) => a.price - b.price);
  if (sort === 'price-desc') data.sort((a, b) => b.price - a.price);
  if (sort === 'name') data.sort((a, b) => a.name.localeCompare(b.name));

  const tbody = document.getElementById('tbody');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="status">No results</td></tr>`;
  } else {
    tbody.innerHTML = data.map((r, i) => {
      const [label, cls] = tier(r.price);
      const img = r.img ? `<div class="product-img-wrapper"><img class="product-img" src="${r.img}" loading="lazy" alt=""><div class="product-img-popup"><img src="${r.img}" alt=""></div></div>` : '';
      return `<tr>
        <td class="dim">${i + 1}</td>
        <td>
          <div class="product-cell">
            ${img}
            <a class="product-name" href="${r.link}" target="_blank">${r.name}</a>
          </div>
        </td>
        <td class="price">${r.price.toLocaleString()}</td>
        <td><span class="badge ${cls}">${label}</span></td>
      </tr>`;
    }).join('');
  }

  const prices = data.map(r => r.price);
  const min = prices.length ? Math.min(...prices) : 0;
  const max = prices.length ? Math.max(...prices) : 0;
  const avg = prices.length ? Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Results</div><div class="stat-val">${data.length}</div></div>
    <div class="stat"><div class="stat-label">Cheapest</div><div class="stat-val">${min.toLocaleString()} ${currentCurrency}</div></div>
    <div class="stat"><div class="stat-label">Average</div><div class="stat-val">${avg.toLocaleString()} ${currentCurrency}</div></div>
    <div class="stat"><div class="stat-label">Most exp.</div><div class="stat-val">${max.toLocaleString()} ${currentCurrency}</div></div>
  `;
}

function downloadCSV() {
  if (allProducts.length === 0) return;

  const headers = ["Name", `Price (${currentCurrency})`, "Link", "Express"];
  const rows = allProducts.map(p => [
    `"${p.name.replace(/"/g, '""')}"`,
    p.price,
    p.link,
    p.express ? "Yes" : "No"
  ]);

  const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  
  const timestamp = new Date().toISOString().slice(0, 10);
  link.setAttribute("href", url);
  link.setAttribute("download", `noon_data_${timestamp}.csv`);
  link.style.visibility = 'hidden';
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScrape();
});
</script>
</body>
</html>
